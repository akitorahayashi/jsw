name: Build

on:
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string

jobs:
  build-release:
    name: Build release binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Rename binary
        run: |
          cp target/release/jsw jsw-linux-x86_64
          chmod +x jsw-linux-x86_64

      - name: Upload release asset
        if: inputs.release_id != ''
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ inputs.release_id }}
          files: jsw-linux-x86_64
          overwrite: true
