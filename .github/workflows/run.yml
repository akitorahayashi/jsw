name: Run jsw

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
    steps:
      - name: Download binary
        run: gh release download --pattern jsw-linux-x86_64 --clobber

      - name: Run jsw
        run: |
          chmod +x ./jsw-linux-x86_64
          ./jsw-linux-x86_64
